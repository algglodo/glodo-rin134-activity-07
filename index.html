<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Shooting Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏀 Basketball Shooting Game</h1>
        </header>

        <section id="player-configuration">
            <h2>1. Add Players</h2>
            <form id="player-form">
                <label for="player-name">Player Name:</label>
                <input type="text" id="player-name" placeholder="Enter player's name" required>
                
                <label for="team-name">Team Name:</label>
                <input type="text" id="team-name" placeholder="Enter team name" required>
                
                <button type="submit">Add Player</button>
            </form>
            <ul id="players"></ul>
        </section>

        <section id="game-execution">
            <h2>2. Execute the Game</h2>
            <button id="start-game">Start Game</button>
        </section>

        <section id="game-results">
            <h2>3. Game Results</h2>
            <div id="rankings"></div>
            <div id="champion"></div>
        </section>
    </div>

    <script src="Activity-7.js"></script>
</body>
</html>
